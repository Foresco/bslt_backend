openapi: 3.0.0
info:
  version: '1'
  title: Basalta REST API
  description: API of Basalta System
paths:
  /user/:
    get:
      summary: Returns array of users, registered
      responses:
        '200':
          description: A JSON array of registered users descriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  pk:
                    type: integer
                    description: User identifier
                    example: 25
                  username:
                    type: string
                    description: User login
                    example: Ivanov
                  first_name:
                    type: string
                    description: User first name
                    example: I.
                  last_name:
                    type: string
                    description: User last name
                    example: Ivanov
                  password:
                    type: string
                    description: Encoded user password
                    example: pbkdf2_sha256$120000$fXYghq1SDoVS$pzioEPO9xbnmhU5gTrTbAHe7FjA/lfNfMBdnWi7pIjA=
                  last_login:
                    type: string
                    description: Date time of this user last login
                    example: 14.10.2020 19:49:07
                  groups:
                    type: array
                    description: List of ids of user groups
                    example: ["2", "4" ]
        '400':
            description: "Invalid status value"
    post:
      summary: Register new user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: User login
                  example: Ivanov
                first_name:
                  type: string
                  description: User first name
                  example: I.
                last_name:
                  type: string
                  description: User last name
                  example: Ivanov
                password:
                  type: string
              example:
                name: Jessica Smith
      responses:
        '201':
          description: A JSON array of new registered user description
          content:
            application/json:
              schema:
                type: object
                properties:
                  pk:
                    type: integer
                    description: User identifier
                    example: 25
                  username:
                    type: string
                    description: User login
                    example: Ivanov
                  first_name:
                    type: string
                    description: User first name
                    example: I.
                  last_name:
                    type: string
                    description: User last name
                    example: Ivanov
                  password:
                    type: string
                    description: Encoded user password
                    example: pbkdf2_sha256$120000$fXYghq1SDoVS$pzioEPO9xbnmhU5gTrTbAHe7FjA/lfNfMBdnWi7pIjA=
                  last_login:
                    type: string
                    description: Date time of this user last login
                    example: null
  /user/{id}:
    patch:
      summary: Update user properties
      responses:
        '200':
          description: A JSON array of registered users descriptions
          content:
  /usergroup/:
    get:
      summary: Returns array of user groups, registered
      responses:
        '200':
          description: A JSON array of user groups descriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  pk:
                    type: integer
                    description: User group identifier
                    example: 25
                  name:
                    type: string
                    description: User group name
                    example: Sysadmins
                  user_set:
                    type: string
                    description: List of ids of group member users
                    example: [1, 2]
        '400':
            description: "Invalid status value"
    post:
      summary: Create new user group
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: User group name
                  example: Sysadmins
      responses:
        '201':
          description: A JSON array of new registered user group description
          content:
            application/json:
              schema:
                type: object
                properties:
                  pk:
                    type: integer
                    description: New user group identifier
                    example: 25
                  name:
                    type: string
                    description: New user group name
                    example: Sysadmins
                  user_set:
                    type: string
                    description: List of ids of group member users
                    example: []
