{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel=icon href="{% static "/icons/favicon.ico" %}">

  <title>{% block title %}Вход в систему Базальта{% endblock title %}</title>

  <link href="{% static "/bootstrap/bootstrap.min.css" %}" rel="stylesheet" id="bootstrap-css">
  <script src="{% static "/bootstrap/bootstrap.min.js" %}"></script>

  <style>
  body {
      margin: 0;
      padding: 0;
      height: 100vh;
    }
    #bslt .container #bslt-row #bslt-column #bslt-box {
      margin-top: 120px;
      max-width: 600px;
      height: auto;
      border: 1px solid #9C9C9C;
      background-color: #EAEAEA;
    }
    #bslt .container #bslt-row #bslt-column #bslt-box #bslt-form {
      padding: 15px;
    }

  </style>

</head>
<body>
{% block content %}

{% endblock content %}
</body>
</html>
